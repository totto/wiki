site_name: "Thor Henning Hetland"
site_url: https://wiki.totto.org
site_description: "Software architect, AI development pioneer, founder of JavaZone and eXOReaction"
site_author: "Thor Henning Hetland"
copyright: >-
  Copyright &copy; 2026 Thor Henning Hetland &nbsp;&middot;&nbsp;
  Co-authored with <a href="https://claude.ai/claude-code" target="_blank" rel="noopener">Claude Code</a>
  &nbsp;&middot;&nbsp;
  Indexed by Synthesis

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/images/totto-2025.jpg
  favicon: assets/images/totto-2025.jpg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.tracking
    - navigation.path
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - toc.follow
    - announce.dismiss

hooks:
  - hooks/series_nav.py

plugins:
  - search:
      lang: [en, "no"]
  - blog:
      blog_dir: blog
      post_date_format: long
      post_url_format: "{date}/{slug}"
      categories: true
      authors: true
      archive: true
      archive_name: "Archive"
      archive_date_format: "MMMM yyyy"
      archive_url_date_format: "yyyy/MM"
      post_readtime: true
      post_readtime_words_per_minute: 200
      pagination_per_page: 10
      post_excerpt: required
      post_excerpt_separator: "<!-- more -->"
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: "On this page"

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/hetland/
      name: LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/totto
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/javatotto
      name: Twitter / X
  generator: false

extra_css:
  - assets/extra.css

